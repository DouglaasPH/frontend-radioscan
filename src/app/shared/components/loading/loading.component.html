<!-- To add to the pages: <loading-state-component class="absolute z-103243"></loading-state-component> -->
<!-- Loading Screen Canvas -->
<main
  class="h-screen w-screen flex flex-col items-center justify-center bg-black/60 pointer-events-none overflow-hidden"
>
  <!-- Central Loading Component -->
  <div class="flex flex-col items-center justify-center space-y-lg">
    <!-- Professional SVG Spinner -->
    <div class="relative w-24 h-24 md:w-32 md:h-32">
      <!-- Static background ring -->
      <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
        <circle cx="50" cy="50" fill="none" r="25" stroke="#dbe4ed" stroke-width="5"></circle>
      </svg>

      <!-- Animated primary ring -->
      <svg class="absolute inset-0 w-full h-full spinner-svg-animated" viewBox="0 0 100 100">
        <circle
          class="spinner-path"
          cx="50"
          cy="50"
          fill="none"
          r="25"
          stroke="#003d9b"
          stroke-linecap="round"
          stroke-width="6"
        ></circle>
      </svg>
    </div>
  </div>
</main>
