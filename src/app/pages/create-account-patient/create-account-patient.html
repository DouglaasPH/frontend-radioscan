<main class="flex h-full w-full">
  <div class="w-full bg-gray-50 flex justify-center items-center pt-10 md:pt-0">
    <div
      class="md:bg-white *:rounded-2xl shadow-lg p-8 w-full md:max-w-2xl h- md:h-auto flex flex-col gap-6 items-center md:rounded-4xl"
    >
      <div class="text-center gap-2 flex flex-col">
        <h2 class="text-5xl font-semibold text-gray-800">Criar Conta</h2>
      </div>
      <form
        class="flex flex-col gap-3 w-full justify-center items-center"
        [formGroup]="registerForm"
        (ngSubmit)="goToTerms()"
      >
        <!-- Inputs de Nome e Sobrenome -->
        <div class="grid grid-cols-1 md:grid-cols-2 w-full gap-4">
          <!-- Nome Input -->
          <div class="flex flex-col gap-2 w-full">
            <label for="Nome" class="text-gray-600 font-medium text-sm">Nome</label>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >person</span
              >
              <input
                id="Nome"
                placeholder="Seu Nome"
                type="text"
                formControlName="first_name"
                required
                class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
              />
            </div>
          </div>
          <!-- Sobrenome Input -->
          <div class="flex flex-col gap-2 w-full">
            <label for="Sobrenome" class="text-gray-600 font-medium text-sm">Sobrenome</label>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >person</span
              >
              <input
                id="Sobrenome"
                placeholder="Seu Sobrenome"
                type="text"
                formControlName="second_name"
                required
                class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
              />
            </div>
          </div>
        </div>
        <!-- Email Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="email" class="text-gray-600 font-medium text-sm">Email</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >mail</span
            >
            <input
              id="email"
              placeholder="seu.email@exemplo.com"
              type="email"
              formControlName="email"
              required
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
          </div>
        </div>
        <!-- Inputs de Senha e Confirmar senha -->
        <div class="grid grid-cols-1 md:grid-cols-2 w-full gap-4">
          <!-- Passsword Input -->
          <div class="flex flex-col gap-2 w-full">
            <label for="password" class="text-gray-600 font-medium text-sm">Senha</label>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >lock</span
              >
              <input
                id="password"
                placeholder="••••••••"
                formControlName="password"
                required=""
                [type]="showPassword() ? 'text' : 'password'"
                class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
              />
              <button type="button" (click)="togglePassword()">
                <span
                  class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                  >{{ showPassword() ? 'visibility_off' : 'visibility' }}</span
                >
              </button>
            </div>
          </div>
          <!-- Confirm Password Input -->
          <div class="flex flex-col gap-2 w-full">
            <label for="confirmPassword" class="text-gray-600 font-medium text-sm"
              >Confirmar Senha</label
            >
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >lock</span
              >
              <input
                id="confirmPassword"
                placeholder="••••••••"
                formControlName="confirmPassword"
                required=""
                [type]="showConfirmPassword() ? 'text' : 'password'"
                class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
              />
              <button id="togglePassword" type="button" (click)="toggleConfirmPassword()">
                <span
                  class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                  >{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</span
                >
              </button>
            </div>
          </div>
        </div>
        <!-- CPF Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="cpf" class="text-gray-600 font-medium text-sm">CPF</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >badge</span
            >
            <input
              id="cpf"
              appCpfMask
              maxlength="14"
              placeholder="000.000.000-00"
              type="text"
              formControlName="cpf"
              required
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
          </div>
        </div>
        <!-- Telefone Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="phone" class="text-gray-600 font-medium text-sm">Telefone</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >phone</span
            >
            <input
              id="phone"
              appPhoneMask
              maxlength="15"
              placeholder="(00) 00000-0000"
              type="text"
              formControlName="phone"
              required
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
          </div>
        </div>
        <!-- Criar conta button -->
        <button
          type="submit"
          [disabled]="registerForm.invalid"
          class="w-full py-3.5 rounded-xl text-md bg-[#055cb9] text-white font-medium hover:bg-[#055cb9]/90 transition-all shadow-sm"
        >
          Criar Conta
        </button>
      </form>
      <!-- Entrar button -->
      <div class="mt-8 text-center">
        <p class="text-gray-600 font-normal text-md">
          Já tem uma conta?
          <a href="/login" class="text-[#055cb9] font-medium">Entrar</a>
        </p>
      </div>
    </div>
  </div>
</main>
