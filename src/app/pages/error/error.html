<main class="w-screen h-screen flex flex-col justify-center items-center gap-8 bg-gray-50">
  <span
    class="material-symbols-outlined !text-7xl [font-variation-settings:'wght'_500] text-gray-600"
    >error</span
  >
  <div class="flex flex-col gap-2 justify-center items-center text-center">
    <h1 class="text-7xl text-[#055cb9]">{{ code() }}</h1>
    <h2 class="text-3xl md:text-4xl text-gray-600 font-medium">{{ errorMessage()[0] }}</h2>
    <p class="text-md text-gray-700 w-90 md:w-120">
      {{ errorMessage()[1] }}
    </p>
  </div>
  <button
    class="px-5 py-3.5 rounded-xl text-md bg-[#055cb9] text-white font-medium hover:bg-[#055cb9]/90 transition-all shadow-sm flex items-center gap-2"
  >
    <span class="material-symbols-outlined [font-variation-settings:'wght'_200]">house</span>
    <a href="/">Voltar ao Início</a>
  </button>
</main>
