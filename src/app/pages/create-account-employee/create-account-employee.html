<main class="flex justify-center items-center h-full">
  <div
    class="bg-white *:rounded-2xl shadow-lg p-8 w-full md:max-w-2xl h-full md:h-auto flex flex-col gap-6 items-center md:rounded-4xl"
  >
    <div class="text-center gap-2 flex flex-col">
      <h2 class="text-5xl font-semibold text-gray-800">Criar Conta de Funcionário</h2>
    </div>
    <form
      [formGroup]="registerForm"
      (ngSubmit)="goToDashboard()"
      class="flex flex-col gap-3 w-full justify-center items-center"
    >
      <!-- Inputs de Nome e Sobrenome -->
      <div class="grid grid-cols-1 md:grid-cols-2 w-full gap-4">
        <!-- Nome Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="Nome" class="text-gray-600 font-medium text-sm">Nome</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >person</span
            >
            <input
              id="Nome"
              placeholder="Seu Nome"
              type="text"
              formControlName="first_name"
              required
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
          </div>
        </div>
        <!-- Sobrenome Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="Sobrenome" class="text-gray-600 font-medium text-sm">Sobrenome</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >person</span
            >
            <input
              id="Sobrenome"
              placeholder="Seu Sobrenome"
              type="text"
              formControlName="second_name"
              required
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
          </div>
        </div>
      </div>
      <!-- Email Input -->
      <div class="flex flex-col gap-2 w-full">
        <label for="email" class="text-gray-600 font-medium text-sm">Email</label>
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
            >mail</span
          >
          <input
            id="email"
            placeholder="seu.email@exemplo.com"
            type="email"
            formControlName="email"
            required
            class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
          />
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 w-full gap-4">
        <!-- Passsword Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="password" class="text-gray-600 font-medium text-sm">Senha</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >lock</span
            >
            <input
              id="password"
              placeholder="••••••••"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              required=""
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
            <button type="button" (click)="togglePassword()">
              <span
                id="visibilityIcon"
                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >{{ showPassword() ? 'visibility_off' : 'visibility' }}</span
              >
            </button>
          </div>
        </div>
        <!-- Confirm Password Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="confirmPassword" class="text-gray-600 font-medium text-sm"
            >Confirmar Senha</label
          >
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >lock</span
            >
            <input
              id="confirmPassword"
              placeholder="••••••••"
              required=""
              [type]="showConfirmPassword() ? 'text' : 'password'"
              formControlName="confirmPassword"
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
            <button type="button" (click)="toggleConfirmPassword()">
              <span
                id="visibilityIcon"
                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</span
              >
            </button>
          </div>
        </div>
      </div>
      <!-- License number Input -->
      <div class="flex flex-col gap-2 w-full">
        <label for="licenseNumber" class="text-gray-600 font-medium text-sm"
          >Número de Licença (CRM para médicos e CRTR para técnicos)</label
        >
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
            >badge</span
          >
          <input
            id="licenseNumber"
            placeholder="000.000.000-00"
            type="text"
            formControlName="licenseNumber"
            required
            class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
          />
        </div>
      </div>
      <!-- Posição Input -->
      <div class="flex flex-col gap-2 w-full">
        <label for="position" class="text-gray-600 font-medium text-sm">Posição</label>
        <div class="relative group">
          <div class="flex flex-col leading-none gap-1 relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >account_box</span
            >
            <select
              name="status"
              id="status"
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none appearance-none"
              formControlName="position"
              required
            >
              <option value="DOCTOR">Doutor</option>
              <option value="TECHNICAL">Técnico</option>
            </select>
            <div
              class="pointer-events-none absolute inset-y-0 right-0 top-1 flex items-center pr-3"
            >
              <span class="material-symbols-outlined text-2xl text-gray-500">
                keyboard_arrow_down
              </span>
            </div>
          </div>
        </div>
      </div>
      <div class="flex flex-col md:flex-row justify-between w-full gap-2 md:gap-10 mt-4">
        <!-- Criar conta button -->
        <button
          type="submit"
          class="w-full py-3.5 rounded-xl text-md bg-[#055cb9] text-white font-medium hover:bg-[#055cb9]/90 transition-all shadow-sm"
        >
          Criar Conta
        </button>
        <!-- Cancelar button -->
        <button
          routerLink="/dashboard/admin/employee-management"
          class="w-full py-3.5 rounded-xl text-md bg-red-700 text-white font-medium hover:bg-red-700/80 transition-all shadow-sm"
        >
          Cancelar
        </button>
      </div>
    </form>
  </div>
</main>
