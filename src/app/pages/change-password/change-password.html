<main class="flex justify-center items-center h-full">
  <div class="w-full flex justify-center items-center">
    <div
      class="bg-white *:rounded-2xl shadow-lg p-8 w-full max-w-2xl flex flex-col gap-6 items-center rounded-4xl"
    >
      <div class="text-center gap-2 flex flex-col">
        <h2 class="text-5xl font-semibold text-gray-800">Alterar senha</h2>
      </div>
      <form
        [formGroup]="passwordsForm"
        (ngSubmit)="changePassword()"
        class="flex flex-col gap-6 w-full justify-center items-center"
      >
        <!-- Passsword Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="password" class="text-gray-600 font-medium text-sm">Senha atual</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >lock</span
            >
            <input
              placeholder="••••••••"
              formControlName="currentPassword"
              required=""
              [type]="showCurrentPassword() ? 'text' : 'password'"
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
            <button type="button" (click)="toggleCurrentPassword()">
              <span
                id="visibilityIcon"
                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >{{ showCurrentPassword() ? 'visibility_off' : 'visibility' }}</span
              >
            </button>
          </div>
        </div>
        <!-- Confirm Password Input -->
        <div class="flex flex-col gap-2 w-full">
          <label for="confirmPassword" class="text-gray-600 font-medium text-sm"
            >Confirmar Senha</label
          >
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >lock</span
            >
            <input
              placeholder="••••••••"
              formControlName="newPassword"
              required=""
              [type]="showNewPassword() ? 'text' : 'password'"
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
            <button type="button" (click)="toggleNewPassword()">
              <span
                id="visibilityIcon"
                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >{{ showNewPassword() ? 'visibility_off' : 'visibility' }}</span
              >
            </button>
          </div>
        </div>
        <!-- Alterar button -->
        <button
          type="button"
          (click)="changePassword()"
          class="w-full py-3.5 rounded-xl text-md bg-[#055cb9] text-white font-medium hover:bg-[#055cb9]/90 transition-all shadow-sm"
        >
          Alterar senha
        </button>
      </form>
      <!-- Entrar button -->
      <div class="mt-8 text-center">
        <p class="text-gray-600 font-normal text-md">
          Esqueceu sua senha atual?
          <a href="" class="text-[#055cb9] font-medium">Alterar via email</a>
        </p>
      </div>
    </div>
  </div>
</main>
