<!-- Success Card -->
<div class="text-center flex flex-col items-center gap-5">
  <!-- Success Icon Cluster -->
  <div class="relative">
    <div class="success-check-pulse bg-green-300 absolute inset-0 z-12490 rounded-full"></div>
    <div
      class="relative w-24 h-24 bg-green-200 rounded-full flex items-center justify-center border-4 border-green-300"
    >
      <span
        class="material-symbols-outlined !text-[64px] text-green-700 leading-none"
        data-icon="check_circle"
        style="font-variation-settings: 'FILL' 1"
        >check_circle</span
      >
    </div>
  </div>
  <!-- Messaging -->
  <h1 class="font-bold text-3xl text-gray-800 mb-sm tracking-tight">Exame enviado com sucesso!</h1>
  <p class="font-medium text-[12px] text-gray-600 max-w-md mx-auto">
    A análise da IA foi iniciada e o médico responsável será notificado assim que os resultados
    estiverem prontos.
  </p>
  <!-- Status Progress Stepper (Contextual Visualizer) -->
  <div class="w-full grid grid-cols-3 gap-3">
    <div class="flex flex-col gap-1">
      <div class="h-2 bg-green-700 rounded-full"></div>
      <span class="font-medium text-[12px] text-green-600">Upload</span>
    </div>
    <div class="flex flex-col gap-1">
      <div class="h-2 bg-green-700/30 rounded-full relative overflow-hidden">
        <div class="absolute inset-0 bg-green-700 w-1/2 animate-progress-loading"></div>
      </div>
      <span class="font-medium text-[12px] text-gray-500">Análise IA</span>
    </div>
    <div class="flex flex-col gap-1">
      <div class="h-2 bg-gray-200 rounded-full"></div>
      <span class="font-medium text-[12px] text-gray-500">Laudo Final</span>
    </div>
  </div>
  <!-- Primary Action -->
  <a
    class="w-full md:w-auto inline-flex items-center justify-center gap-2 bg-[#055cb9] text-white px-6 py-3 rounded-lg hover:shadow-lg hover:translate-y-[-2px] transition-all active:scale-95"
  >
    Voltar para Minhas Consultas
  </a>
  <!-- Secondary Option -->
  <button class="text-[#055cb9] hover:underline decoration-2 underline-offset-4">
    Visualizar detalhes do envio
  </button>
</div>
