<main class="flex h-screen w-screen">
  <div
    class="hidden xl:flex xl:w-1/2 bg-[#055cb9] z-10 text-center px-12 justify-center items-center flex-col"
  >
    <img
      src="assets/images/logo.jpg"
      alt="Logo da Empresa"
      class="w-48 h-48 object-contain mx-auto mb-8 rounded-2xl bg-white/10 backdrop-blur-md p-4 border border-white/20 shadow-2xl"
    />
    <h2 class="font-medium text-4xl text-white mb-4">Precisão em Diagnóstico</h2>
    <p class="text-md text-white/80 max-w-md mx-auto">
      Imagem avançada e gestão de fluxo de trabalho integrada para profissionais de saúde modernos
    </p>
  </div>
  <div class="w-full xl:w-1/2 h-screen bg-gray-100 flex justify-center items-center px-12">
    <div
      class="bg-white *:rounded-2xl shadow-lg p-8 w-full max-w-2xl flex flex-col gap-6 items-center rounded-4xl"
    >
      <div class="text-center gap-2 flex flex-col">
        <h2 class="text-5xl font-semibold text-gray-800">Bem-vindo de volta</h2>
        <p class="text-gray-500 font-normal text-md">Acesse sua conta para continuar</p>
      </div>
      <form class="flex flex-col gap-6 w-full justify-center items-center">
        <div class="flex flex-col gap-2 w-full">
          <label for="email" class="text-gray-600 font-medium text-sm">Email</label>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >mail</span
            >
            <input
              id="email"
              placeholder="seu.email@exemplo.com"
              type="email"
              required
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
          </div>
        </div>
        <div class="flex flex-col gap-2 w-full">
          <div class="flex justify-between gap-2 w-full">
            <label for="password" class="text-gray-600 font-medium text-sm">Senha</label>
            <a href="#" class="text-[#055cb9] font-medium text-sm">Esqueceu a senha?</a>
          </div>
          <div class="relative group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
              >lock</span
            >
            <input
              id="password"
              placeholder="••••••••"
              required=""
              type="password"
              class="w-full pl-12 pr-4 py-3.5 rounded-xl text-md focus:bg-white transition-all shadow-sm border border-gray-200 focus:border-primary/50 bg-gray-100 text-gray-700 focus:outline-none"
            />
            <button id="togglePassword" type="button">
              <span
                id="visibilityIcon"
                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[22px] text-gray-400 [font-variation-settings:'wght'_300]"
                >visibility</span
              >
            </button>
          </div>
        </div>
        <button
          type="submit"
          class="w-full py-3.5 rounded-xl text-md bg-[#055cb9] text-white font-medium hover:bg-[#055cb9]/90 transition-all shadow-sm"
        >
          Entrar
        </button>
      </form>
      <div class="flex items-center gap-4 my-8 w-full">
        <div
          class="h-px flex-1 bg-gradient-to-r from-transparent bg-[#c2c6d4] to-transparent"
        ></div>
        <span
          class="font-medium text-[#c2c6d4] text-label-sm text-outline uppercase tracking-widest bg-white px-2"
          >ou</span
        >
        <div
          class="h-px flex-1 bg-gradient-to-r from-transparent bg-[#c2c6d4] to-transparent"
        ></div>
      </div>
      <button
        class="w-full py-3.5 rounded-xl text-md bg-white text-gray-600 font-medium hover:bg-gray-50 border-1 border-gray-200 transition-all shadow-sm"
      >
        <img
          src="assets/icons/google-icon.svg"
          alt="Google Icon"
          class="w-5 h-5 inline-block mr-2"
        />
        Entrar com Google
      </button>
      <div class="mt-8 text-center">
        <p class="text-gray-600 font-normal text-md">
          Não tem uma conta?
          <a href="#" class="text-[#055cb9] font-medium">Cadastre-se</a>
        </p>
      </div>
    </div>
  </div>
</main>
